name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create .env file
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
          echo "VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}" >> .env
          echo "VITE_SPOTIFY_CLIENT_ID=${{ secrets.VITE_SPOTIFY_CLIENT_ID }}" >> .env
          echo "VITE_SPOTIFY_REDIRECT_URI=${{ secrets.VITE_SPOTIFY_REDIRECT_URI }}" >> .env

      - run: pnpm build

      # Deploy Firestore rules before hosting so new rules are live before the
      # frontend that depends on them. Both use firebase-tools >= 15.22.3, which
      # retries without keep-alive to dodge the Node 24.17+ node-fetch
      # "Premature close" token-fetch bug (nodejs/node#63989). This replaces
      # FirebaseExtended/action-hosting-deploy, whose whole-deploy retry collided
      # with that bug ("supplied version is the current active version").
      - name: Deploy Firestore rules and hosting
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BEAT_4_BEAT }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          # The secret may be raw JSON or base64-encoded; accept both.
          if printf '%s' "$FIREBASE_SERVICE_ACCOUNT" | head -c 1 | grep -q '{'; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          else
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT" | base64 -d > "$GOOGLE_APPLICATION_CREDENTIALS"
          fi
          trap 'rm -f "$GOOGLE_APPLICATION_CREDENTIALS"' EXIT
          # Fail early with a clear message if the credentials aren't valid JSON.
          node -e "JSON.parse(require('fs').readFileSync(process.env.GOOGLE_APPLICATION_CREDENTIALS,'utf8'))" \
            || { echo "::error::FIREBASE_SERVICE_ACCOUNT did not decode to valid JSON"; exit 1; }
          npx firebase-tools@15 deploy --only firestore:rules --project beat-4-beat
          npx firebase-tools@15 deploy --only hosting --project beat-4-beat
