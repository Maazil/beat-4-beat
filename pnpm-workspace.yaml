# pnpm workspace configuration
# See: https://pnpm.io/pnpm-workspace_yaml

# Packages in the workspace (none for single-package project)
packages: []

# Supply chain security settings
# See: https://pnpm.io/supply-chain-security

# Enforce minimum release age of 7 days (10080 minutes) to reduce risk of compromised packages
minimumReleaseAge: 10080

# Exclude well-known dev tools from minimum release age check
minimumReleaseAgeExclude:
  - globals
  - oxlint
  - oxfmt
  - minimatch

# Block all dependency lifecycle scripts (preinstall/install/postinstall) by default.
# Add packages here to explicitly allow them to run scripts (e.g. - esbuild).
onlyBuiltDependencies: []
